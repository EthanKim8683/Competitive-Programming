services:
  nats:
    image: nats:latest
    container_name: cp-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "9222:9222"
      - "8222:8222"
    volumes:
      - ./config/nats.conf:/etc/nats/nats.conf
    command: ["-c", "/etc/nats/nats.conf"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8222/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
