syntax = "proto3";

package cp.automate.v1;

import "scrape_problem.proto";
import "scrape_contest.proto";
import "submit.proto";

service AutomateService {
	rpc ScrapeProblem(ScrapeProblemRequest) returns (ScrapeProblemResponse);
  rpc ScrapeContest(ScrapeContestRequest) returns (ScrapeContestResponse);
  rpc Submit(SubmitRequest) returns (SubmitResponse); 
}