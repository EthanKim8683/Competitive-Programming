syntax = "proto3";

package browserservice.v1;

service BrowserService {
  rpc Session(SessionRequest) returns (stream SessionResponse);
}

message SessionRequest {
	message KeepAlive {
		uint32 timeout_ms = 1;
	}

	optional KeepAlive keep_alive = 1;
}

message SessionResponse {
	string control_url = 1;
}