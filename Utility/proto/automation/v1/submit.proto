syntax = "proto3";

package automation.v1;

message SubmitRequest {
	enum Language {
		LANGUAGE_UNSPECIFIED = 0;
		LANGUAGE_CPP20 = 1;
		LANGUAGE_CPP23 = 2;
	}

	string url = 1;
	string body = 2;
	optional Language language = 3;
}

message SubmitResponse {
	enum Verdict {
		VERDICT_UNSPECIFIED = 0;
		VERDICT_ACCEPTED = 1;
		VERDICT_WRONG_ANSWER = 2;
		VERDICT_RUNTIME_ERROR = 3;
		VERDICT_TIME_LIMIT_EXCEEDED = 4;
		VERDICT_MEMORY_LIMIT_EXCEEDED = 5;
	}

	Verdict verdict = 1;
	int32 time = 2;
	int32 memory = 3;
}