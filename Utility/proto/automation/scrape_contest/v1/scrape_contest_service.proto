syntax = "proto3";

package automation.scrape_contest.v1;

import "contest/v1/contest.proto";

option go_package = "github.com/EthanKim8683/Competitive-Programming/Utility/gen/automation/scrape_contest/v1;scrapecontestv1";

message ScrapeContestRequest {
  string url = 1;
}

message ScrapeContestResponse {
  contest.v1.Contest contest = 1;
  optional string error = 2;
}