syntax = "proto3";

package submission.v1;

import "language/v1/language.proto";

option go_package = "github.com/EthanKim8683/Competitive-Programming/Utility/gen/submission/v1;submissionv1";

enum Verdict {
  VERDICT_UNSPECIFIED = 0;
  VERDICT_IN_PROGRESS = 1;
  VERDICT_ACCEPTED = 2;
  VERDICT_WRONG_ANSWER = 3;
  VERDICT_RUNTIME_ERROR = 4;
  VERDICT_TIME_LIMIT_EXCEEDED = 5;
  VERDICT_MEMORY_LIMIT_EXCEEDED = 6;
	VERDICT_COMPILATION_ERROR = 7;
	VERDICT_SUBMISSION_FAILED = 8;
}

message Submission {
  string url = 1;
  Verdict verdict = 2;
  language.v1.Language language = 3;
  string source = 4;
  uint32 time = 5;
  uint32 memory = 6;
}
