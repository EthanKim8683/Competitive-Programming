version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/EthanKim8683/Competitive-Programming/Utility/internal/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: internal/gen
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: internal/gen
    opt: paths=source_relative