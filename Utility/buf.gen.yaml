version: v2
inputs:
  - directory: proto
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/bufbuild/es
    out: web/chrome-extension/src/gen
    opt: target=ts
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/EthanKim8683/Competitive-Programming/Utility/gen